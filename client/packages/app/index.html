<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <title>ADP Chat Client</title>
    <style id="loading-style">
      /* 首屏加载动画 - 会在 Vue 挂载后移除 */
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: #fff;
        z-index: 99999;
        transition: opacity 0.3s ease-out;
      }
      #app-loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #app-loading .loading-text {
        margin-top: 20px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        color: #666;
        letter-spacing: 0.5px;
        animation: loadingTextPulse 2s ease-in-out infinite;
      }
      #app-loading .animated-icon {
        width: 64px;
        height: 52px;
      }
      #app-loading .animated-icon svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }
      /* 闲置浮动动画 */
      .animated-icon__eye-left,
      .animated-icon__eye-right {
        transition: transform 0.06s ease-out;
        animation: animatedIconEyeIdle 4s ease-in-out infinite;
      }
      .animated-icon__eye-left { transform-origin: 19.6px 15.8px; }
      .animated-icon__eye-right { transform-origin: 30px 15.6px; }
      .animated-icon__hex-outer {
        transition: transform 0.15s ease-out;
        transform-origin: 23.75px 18.5px;
        animation: animatedIconHexIdle 5s ease-in-out infinite;
      }
      .animated-icon__hex-inner {
        transition: transform 0.12s ease-out;
        transform-origin: 23.75px 18.5px;
        animation: animatedIconHexIdle 4.5s ease-in-out infinite;
        animation-delay: 0.3s;
      }
      .animated-icon__hex-corner {
        transition: transform 0.18s ease-out;
        transform-origin: 41px 8px;
        animation: animatedIconHexIdle 5.5s ease-in-out infinite;
        animation-delay: 0.6s;
      }
      @keyframes animatedIconEyeIdle {
        0%, 100% { transform: translate(0px, 0px); }
        20% { transform: translate(0.6px, -0.3px); }
        40% { transform: translate(1px, 0.2px); }
        60% { transform: translate(0.3px, 0.5px); }
        80% { transform: translate(-0.4px, 0.1px); }
      }
      @keyframes animatedIconHexIdle {
        0%, 100% { transform: rotate(0deg) translate(0px, 0px); }
        25% { transform: rotate(0.3deg) translate(0.2px, -0.1px); }
        50% { transform: rotate(-0.2deg) translate(-0.1px, 0.15px); }
        75% { transform: rotate(0.15deg) translate(0.1px, 0.1px); }
      }
      @keyframes loadingTextPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      @media (prefers-reduced-motion: reduce) {
        .animated-icon__eye-left,
        .animated-icon__eye-right,
        .animated-icon__hex-outer,
        .animated-icon__hex-inner,
        .animated-icon__hex-corner {
          animation: none !important;
        }
        #app-loading .loading-text {
          animation: none !important;
        }
      }
    </style>
  </head>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>

    <!-- 首屏加载动画：鼠标跟随 + 眨眼 + Vue 挂载后自动移除 -->
    <script>
      (function() {
        var eyeLeft = document.getElementById('loading-eye-left');
        var eyeRight = document.getElementById('loading-eye-right');
        var hexOuter = document.querySelector('.animated-icon__hex-outer');
        var hexInner = document.querySelector('.animated-icon__hex-inner');
        var hexCorner = document.querySelector('.animated-icon__hex-corner');
        var svgEl = document.querySelector('#app-loading .animated-icon svg');
        var blinkTimer = null;
        var rafId = null;
        var isMouseTracking = false;

        // ---------- 配置 ----------
        var CONFIG = {
          maxMove: 3,
          maxMoveDownMultiplier: 4,
          hexMaxRotate: 2.5,
          hexMaxMove: 2,
          hexMaxMoveDownMultiplier: 2.5,
          hexMaxMoveUpMultiplier: 1.5,
          maxDistance: 300
        };

        // ---------- 鼠标跟随 ----------
        function removeIdleAnimations() {
          var els = [eyeLeft, eyeRight, hexOuter, hexInner, hexCorner];
          for (var i = 0; i < els.length; i++) {
            if (els[i]) els[i].style.animation = 'none';
          }
          isMouseTracking = true;
        }

        function restoreIdleAnimations() {
          if (eyeLeft) eyeLeft.style.animation = '';
          if (eyeRight) eyeRight.style.animation = '';
          if (hexOuter) hexOuter.style.animation = '';
          if (hexInner) hexInner.style.animation = '';
          if (hexCorner) hexCorner.style.animation = '';
          // 清除 inline transform
          var els = [eyeLeft, eyeRight, hexOuter, hexInner, hexCorner];
          for (var i = 0; i < els.length; i++) {
            if (els[i]) els[i].style.transform = '';
          }
          isMouseTracking = false;
        }

        function applyMouseMove(e) {
          if (!svgEl) return;
          var rect = svgEl.getBoundingClientRect();
          var svgCenterX = rect.left + rect.width / 2;
          var svgCenterY = rect.top + rect.height / 2;
          var dx = e.clientX - svgCenterX;
          var dy = e.clientY - svgCenterY;
          var distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < 2) return;

          var ratio = Math.min(Math.pow(distance / CONFIG.maxDistance, 0.5), 1);

          // 眼睛移动
          var eyeMaxMoveX = dx < 0 ? 5 : CONFIG.maxMove;
          var moveX = (dx / distance) * eyeMaxMoveX * ratio;
          var maxMoveY = dy > 0
            ? CONFIG.maxMove * CONFIG.maxMoveDownMultiplier
            : CONFIG.maxMove;
          var moveY = (dy / distance) * maxMoveY * ratio;

          // 六边形视差
          var hexRotate = (dx / Math.max(distance, 1)) * CONFIG.hexMaxRotate * ratio;
          var hexMoveX = (dx / distance) * CONFIG.hexMaxMove * ratio;
          var hexMaxMoveY = dy > 0
            ? CONFIG.hexMaxMove * CONFIG.hexMaxMoveDownMultiplier
            : CONFIG.hexMaxMove * CONFIG.hexMaxMoveUpMultiplier;
          var hexMoveY = (dy / distance) * hexMaxMoveY * ratio;

          if (!isMouseTracking) removeIdleAnimations();

          if (eyeLeft) eyeLeft.style.transform = 'translate(' + moveX + 'px, ' + moveY + 'px)';
          if (eyeRight) eyeRight.style.transform = 'translate(' + moveX + 'px, ' + moveY + 'px)';
          if (hexOuter) hexOuter.style.transform = 'rotate(' + (hexRotate * 0.7) + 'deg) translate(' + (hexMoveX * 0.8) + 'px, ' + (hexMoveY * 0.8) + 'px)';
          if (hexInner) hexInner.style.transform = 'rotate(' + (hexRotate * 0.9) + 'deg) translate(' + hexMoveX + 'px, ' + hexMoveY + 'px)';
          if (hexCorner) hexCorner.style.transform = 'rotate(' + (hexRotate * 1.2) + 'deg) translate(' + (hexMoveX * 1.2) + 'px, ' + (hexMoveY * 0.9) + 'px)';
        }

        function onMouseMove(e) {
          if (rafId) return;
          rafId = requestAnimationFrame(function() {
            rafId = null;
            applyMouseMove(e);
          });
        }

        function onMouseLeave() {
          if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
          restoreIdleAnimations();
        }

        document.addEventListener('mousemove', onMouseMove, { passive: true });
        document.addEventListener('mouseleave', onMouseLeave);

        // ---------- 随机眨眼 ----------
        function doBlink() {
          if (!eyeLeft || !eyeRight) return;
          var lp = eyeLeft.querySelector('path');
          var rp = eyeRight.querySelector('path');
          if (!lp || !rp) return;

          lp.style.transformOrigin = '19.6px 15.8px';
          lp.style.transition = 'transform 0.08s ease-in-out';
          lp.style.transform = 'scaleY(0.1)';
          rp.style.transformOrigin = '30px 15.6px';
          rp.style.transition = 'transform 0.08s ease-in-out';
          rp.style.transform = 'scaleY(0.1)';

          setTimeout(function() {
            lp.style.transition = 'transform 0.1s ease-out';
            lp.style.transform = 'scaleY(1)';
            rp.style.transition = 'transform 0.1s ease-out';
            rp.style.transform = 'scaleY(1)';
          }, 120);
        }

        function scheduleBlink() {
          var delay = 2500 + Math.random() * 3500;
          blinkTimer = setTimeout(function() {
            doBlink();
            scheduleBlink();
          }, delay);
        }

        setTimeout(scheduleBlink, 2000);

        // ---------- Vue 挂载后移除 ----------
        function cleanup() {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseleave', onMouseLeave);
          if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
          if (blinkTimer) { clearTimeout(blinkTimer); blinkTimer = null; }
        }

        var observer = new MutationObserver(function() {
          var app = document.getElementById('app');
          if (app && app.children.length > 0) {
            var loading = document.getElementById('app-loading');
            if (loading) {
              loading.classList.add('fade-out');
              setTimeout(function() {
                loading.remove();
                var style = document.getElementById('loading-style');
                if (style) style.remove();
              }, 300);
            }
            cleanup();
            observer.disconnect();
          }
        });

        var app = document.getElementById('app');
        if (app) {
          observer.observe(app, { childList: true, subtree: true });
        }
      })();
    </script>
